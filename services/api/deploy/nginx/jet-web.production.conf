# Production behind Nginx Proxy Manager — internal nginx on 192.168.101.181
# NPM forwards: api/app/admin/partner.jet-web.ir → this host.

# API
server {
    listen 80;
    server_name api.jet-web.ir;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# Merchant
server {
    listen 80;
    server_name app.jet-web.ir;
    root /var/www/portal/apps/client/dist-merchant;
    index index.html;

    location = /config.json { add_header Cache-Control "no-store"; try_files $uri =404; }
    location / { try_files $uri $uri/ /index.html; }
}

# Admin
