# Local preview — hostname-based portal isolation on one IP.
# Map hosts to this server (e.g. 192.168.101.181):
#   app.jet-web.ir     → merchant build
#   admin.jet-web.ir   → admin build
#   partner.jet-web.ir → affiliate build
# IP-only access (server_name below) serves merchant only — not a substitute for full portal QA.

# Merchant — IP-only fallback (merchant preview only)
server {
    listen 80;
    listen [::]:80;
    server_name 192.168.101.181;

    root /var/www/portal/apps/client/dist-merchant;
    index index.html;

    include /etc/nginx/snippets/portal-api-proxy.conf;
    include /etc/nginx/snippets/portal-spa.conf;
}

# Merchant — hostname
server {
    listen 80;
    listen [::]:80;
    server_name app.jet-web.ir;

    root /var/www/portal/apps/client/dist-merchant;
    index index.html;

    include /etc/nginx/snippets/portal-api-proxy.conf;
    include /etc/nginx/snippets/portal-spa.conf;
}

# Admin
server {
    listen 80;
    listen [::]:80;
    server_name admin.jet-web.ir;

    root /var/www/portal/apps/client/dist-admin;
    index index.html;

    include /etc/nginx/snippets/portal-api-proxy.conf;
    include /etc/nginx/snippets/portal-spa.conf;
}

# Affiliate / partner
server {
    listen 80;
    listen [::]:80;
    server_name partner.jet-web.ir;

    root /var/www/portal/apps/client/dist-affiliate;
    index index.html;

    include /etc/nginx/snippets/portal-api-proxy.conf;
    include /etc/nginx/snippets/portal-spa.conf;
}

# API subdomain (optional local preview via hosts: api.jet-web.ir)
server {
    listen 80;
    listen [::]:80;
    server_name api.jet-web.ir;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
