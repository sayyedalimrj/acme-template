name: CI

on:
  push:
    branches: [master, main, 'cursor/**']
  pull_request:
    branches: [master, main, 'cursor/**']

jobs:
  backend:
    name: Backend (services/api)
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://test:test@localhost:5432/test
      JWT_SECRET: ci-test-jwt-secret-0123456789abcdef
      OTP_HASH_SECRET: ci-test-otp-secret-0123456789abcdef
      CREDENTIAL_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      CORS_ORIGINS: https://app.example.com,https://admin.example.com,https://partner.example.com
      SMS_DRY_RUN: 'true'
      ADMIN_MOBILE_ALLOWLIST: '09120000000'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/api/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run migrate

  frontend:
    name: Frontend (apps/client)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/client/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:ci
      - run: npm run export:web:all
        env:
          EXPO_PUBLIC_API_BASE_URL: https://api.example.com
